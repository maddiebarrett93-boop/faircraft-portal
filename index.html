<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faircraft Staff Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Germania+One&family=Montserrat:wght@300;400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --obsidian: #0A0A0A;
    --gold: #C5A059;
    --concrete: #2E2E2E;
    --neutral900: #171717;
    --white: #FFFFFF;
    --concrete-light: #8C8C8C;
    --taupe: #564E58;
    --burnt-rose: #904E55;
    --icy-blue: #A5D8FF;
    --kiln-red: #803030;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--obsidian);
    color: var(--white);
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
    font-size: 14px;
  }

  /* HEADER */
  .header {
    background: var(--neutral900);
    border-bottom: 1px solid var(--concrete);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-logo {
    font-family: 'Germania One', serif;
    font-size: 20px;
    color: var(--gold);
    letter-spacing: 1px;
  }

  .header-logo span {
    color: var(--white);
    font-size: 11px;
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    display: block;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: -2px;
  }

  .header-date {
    font-family: 'Lato', sans-serif;
    font-size: 11px;
    color: var(--concrete-light);
    text-align: right;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .header-date strong {
    display: block;
    color: var(--gold);
    font-size: 13px;
    font-weight: 700;
  }

  /* TOGGLE TABS */
  .view-toggle {
    display: flex;
    gap: 0;
    padding: 16px 20px 0;
    border-bottom: 1px solid var(--concrete);
  }

  .toggle-btn {
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 20px;
    background: transparent;
    border: 1px solid var(--concrete);
    color: var(--concrete-light);
    cursor: pointer;
    transition: all 0.2s;
  }

  .toggle-btn:first-child { border-right: none; }
  .toggle-btn.active {
    background: var(--gold);
    color: var(--obsidian);
    border-color: var(--gold);
  }

  /* CONFIG BANNER */
  .config-banner {
    background: var(--neutral900);
    border: 1px solid var(--concrete);
    border-left: 3px solid var(--gold);
    margin: 16px 20px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .config-banner label {
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    white-space: nowrap;
  }

  .config-banner input {
    flex: 1;
    min-width: 200px;
    background: var(--concrete);
    border: 1px solid var(--taupe);
    color: var(--white);
    padding: 7px 10px;
    font-family: 'Lato', sans-serif;
    font-size: 12px;
    outline: none;
  }

  .config-banner input:focus { border-color: var(--gold); }

  .config-btn {
    background: var(--gold);
    color: var(--obsidian);
    border: none;
    padding: 8px 14px;
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s;
  }

  .config-btn:hover { opacity: 0.85; }

  /* STATUS BAR */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 20px 12px;
    font-family: 'Lato', sans-serif;
    font-size: 11px;
    color: var(--concrete-light);
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--taupe);
    flex-shrink: 0;
  }
  .status-dot.live { background: #5a9e5a; animation: pulse 2s infinite; }
  .status-dot.loading { background: var(--gold); }
  .status-dot.error { background: var(--kiln-red); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ========== DAY VIEW ========== */
  .day-view { padding: 0 20px 20px; }

  .date-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding-top: 4px;
  }

  .date-nav button {
    background: var(--neutral900);
    border: 1px solid var(--concrete);
    color: var(--white);
    width: 34px; height: 34px;
    font-size: 16px;
    cursor: pointer;
    transition: border-color 0.2s;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .date-nav button:hover { border-color: var(--gold); color: var(--gold); }

  .date-display {
    font-family: 'Germania One', serif;
    font-size: 22px;
    color: var(--white);
    letter-spacing: 1px;
  }

  .date-display .weekday {
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    display: block;
    margin-bottom: 2px;
  }

  .today-badge {
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: var(--gold);
    color: var(--obsidian);
    padding: 4px 10px;
    margin-left: auto;
    cursor: pointer;
  }

  .category-section { margin-bottom: 16px; }

  .cat-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .cat-label {
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
  }

  .cat-line { flex: 1; height: 1px; background: var(--concrete); }

  .cat-count {
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    color: var(--concrete-light);
    letter-spacing: 1px;
  }

  .card {
    background: var(--neutral900);
    border: 1px solid var(--concrete);
    padding: 12px 14px;
    margin-bottom: 8px;
    transition: border-color 0.2s;
    position: relative;
  }

  .card:hover { border-color: var(--gold); }

  .card-accent {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }

  .card-title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--white);
    margin-bottom: 4px;
    padding-left: 10px;
  }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding-left: 10px;
  }

  .card-tag {
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--concrete-light);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .card-tag.highlight { color: var(--gold); }
  .card-tag.note { color: var(--icy-blue); }

  .card-note {
    padding-left: 10px;
    margin-top: 6px;
    font-family: 'Lato', sans-serif;
    font-size: 12px;
    color: var(--concrete-light);
    font-weight: 300;
    line-height: 1.5;
    border-top: 1px solid var(--concrete);
    padding-top: 6px;
  }

  .empty-state {
    font-family: 'Lato', sans-serif;
    font-size: 12px;
    color: var(--taupe);
    font-style: italic;
    padding: 10px 14px;
    border: 1px dashed var(--concrete);
    text-align: center;
  }

  /* ========== MONTH VIEW ========== */
  .month-view { padding: 0 20px 20px; }

  .month-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-top: 4px;
  }

  .month-title {
    font-family: 'Germania One', serif;
    font-size: 20px;
    color: var(--white);
    letter-spacing: 1px;
    flex: 1;
  }

  .month-nav button {
    background: var(--neutral900);
    border: 1px solid var(--concrete);
    color: var(--white);
    width: 32px; height: 32px;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .month-nav button:hover { border-color: var(--gold); color: var(--gold); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }

  .cal-dow {
    font-family: 'Lato', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--concrete-light);
    text-align: center;
    padding: 6px 0;
  }

  .cal-day {
    background: var(--neutral900);
    border: 1px solid var(--concrete);
    min-height: 70px;
    padding: 6px;
    cursor: pointer;
    transition: border-color 0.15s;
    position: relative;
  }

  .cal-day:hover { border-color: var(--taupe); }
  .cal-day.today { border-color: var(--gold); }
  .cal-day.selected { border-color: var(--gold); background: #1a1508; }
  .cal-day.other-month { opacity: 0.3; }

  .cal-day-num {
    font-family: 'Germania One', serif;
    font-size: 15px;
    color: var(--white);
    line-height: 1;
    margin-bottom: 4px;
  }

  .cal-day.today .cal-day-num { color: var(--gold); }

  .cal-pip-row { display: flex; flex-wrap: wrap; gap: 2px; }

  .cal-pip { width: 6px; height: 6px; border-radius: 50%; }

  .cal-day-preview {
    font-family: 'Lato', sans-serif;
    font-size: 9px;
    color: var(--concrete-light);
    line-height: 1.3;
    margin-top: 3px;
  }

  /* Refresh btn */
  .refresh-btn {
    background: transparent;
    border: 1px solid var(--concrete);
    color: var(--concrete-light);
    padding: 5px 10px;
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    margin-left: auto;
    transition: all 0.2s;
  }

  .refresh-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    padding: 8px 20px 0;
    margin-bottom: 4px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    color: var(--concrete-light);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* Mobile */
  @media (max-width: 480px) {
    .cal-day { min-height: 52px; padding: 4px; }
    .cal-day-num { font-size: 12px; }
    .cal-day-preview { display: none; }
    .header-logo { font-size: 17px; }
    .date-display { font-size: 18px; }
    .config-banner input { min-width: 140px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    Faircraft
    <span>Staff Portal</span>
  </div>
  <div class="header-date" id="headerDate"></div>
</div>

<div class="view-toggle">
  <button class="toggle-btn active" id="dayBtn" onclick="setView('day')">Day View</button>
  <button class="toggle-btn" id="monthBtn" onclick="setView('month')">Month View</button>
</div>

<div class="config-banner">
  <label>Sheet ID</label>
  <input type="text" id="sheetIdInput" placeholder="Paste your Google Sheet ID here..." />
  <button class="config-btn" onclick="saveAndLoad()">Load</button>
</div>

<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">Enter your Sheet ID above to connect</span>
  <button class="refresh-btn" onclick="loadData()" id="refreshBtn" style="display:none">↺ Refresh</button>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#C5A059"></div> Events</div>
  <div class="legend-item"><div class="legend-dot" style="background:#904E55"></div> Bands</div>
  <div class="legend-item"><div class="legend-dot" style="background:#5a9e5a"></div> Food</div>
  <div class="legend-item"><div class="legend-dot" style="background:#A5D8FF"></div> Firkins</div>
</div>

<!-- DAY VIEW -->
<div class="day-view" id="dayView">
  <div class="date-nav">
    <button onclick="changeDay(-1)">&#8249;</button>
    <div>
      <div class="date-display">
        <span class="weekday" id="dayWeekday">—</span>
        <span id="dayDateLabel">—</span>
      </div>
    </div>
    <div class="today-badge" onclick="goToday()">Today</div>
  </div>
  <div id="dayContent">
    <div class="empty-state">Connect a sheet to view the schedule</div>
  </div>
</div>

<!-- MONTH VIEW -->
<div class="month-view" id="monthView" style="display:none">
  <div class="month-nav">
    <button onclick="changeMonth(-1)">&#8249;</button>
    <div class="month-title" id="monthTitle"></div>
    <button onclick="changeMonth(1)">&#8250;</button>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<script>
  const COLORS = {
    event:  '#C5A059',
    band:   '#904E55',
    food:   '#5a9e5a',
    firkin: '#A5D8FF',
  };

  let currentView = 'day';
  let selectedDate = new Date();
  let calMonth = new Date();
  let allData = [];
  let sheetId = localStorage.getItem('fc_sheetId') || '1Hr0lgStBGYwNMSajP2DYt_5X8KLuhjqDJsOJhpEvcY4';

  window.onload = () => {
    updateHeaderDate();
    document.getElementById('sheetIdInput').value = sheetId;
    if (sheetId) {
      loadData();
    }
    renderDayView();
    renderCalendar();
    setInterval(updateHeaderDate, 60000);
  };

  function updateHeaderDate() {
    const now = new Date();
    document.getElementById('headerDate').innerHTML =
      `<strong>${now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</strong>${now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}`;
  }

  function setView(v) {
    currentView = v;
    document.getElementById('dayView').style.display = v === 'day' ? '' : 'none';
    document.getElementById('monthView').style.display = v === 'month' ? '' : 'none';
    document.getElementById('dayBtn').classList.toggle('active', v === 'day');
    document.getElementById('monthBtn').classList.toggle('active', v === 'month');
    if (v === 'month') renderCalendar();
  }

  function saveAndLoad() {
    sheetId = document.getElementById('sheetIdInput').value.trim();
    localStorage.setItem('fc_sheetId', sheetId);
    loadData();
  }

  async function loadData() {
    if (!sheetId) return;
    setStatus('loading', 'Fetching schedule...');
    document.getElementById('refreshBtn').style.display = '';
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=Sheet1`;
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error();
      const csv = await res.text();
      allData = parseCSV(csv);
      const t = new Date();
      setStatus('live', `Live · ${allData.length} entries · ${t.toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit'})}`);
      renderDayView();
      renderCalendar();
    } catch (e) {
      setStatus('error', 'Could not load sheet — make sure it\'s shared: Anyone with link → Viewer');
    }
  }

  function parseCSV(text) {
    const rows = [];
    const lines = text.trim().split('\n');
    if (lines.length < 2) return rows;
    for (let i = 1; i < lines.length; i++) {
      const cols = splitCSVRow(lines[i]);
      if (!cols[0]) continue;
      const raw = cols[0].replace(/"/g, '').trim();
      const d = parseDate(raw);
      if (!d) continue;
      rows.push({
        date: d,
        dateStr: toYMD(d),
        type:   (cols[1] || '').replace(/"/g, '').trim().toLowerCase(),
        title:  (cols[2] || '').replace(/"/g, '').trim(),
        time:   (cols[3] || '').replace(/"/g, '').trim(),
        notes:  (cols[4] || '').replace(/"/g, '').trim(),
        detail: (cols[5] || '').replace(/"/g, '').trim(),
      });
    }
    return rows;
  }

  function splitCSVRow(line) {
    const result = [];
    let cur = '', inQ = false;
    for (let c of line) {
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
      else cur += c;
    }
    result.push(cur);
    return result;
  }

  function parseDate(s) {
    if (!s) return null;
    if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
      const d = new Date(s + 'T00:00:00');
      return isNaN(d) ? null : d;
    }
    const parts = s.split('/');
    if (parts.length >= 3) {
      let yr = parseInt(parts[2]);
      if (yr < 100) yr += 2000;
      const d = new Date(yr, parseInt(parts[0])-1, parseInt(parts[1]));
      return isNaN(d) ? null : d;
    }
    return null;
  }

  function toYMD(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function setStatus(state, text) {
    document.getElementById('statusDot').className = 'status-dot' + (state !== 'idle' ? ' ' + state : '');
    document.getElementById('statusText').textContent = text;
  }

  function renderDayView() {
    const dows = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    document.getElementById('dayWeekday').textContent = dows[selectedDate.getDay()];
    document.getElementById('dayDateLabel').textContent = selectedDate.toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});

    const ymd = toYMD(selectedDate);
    const dayData = allData.filter(r => r.dateStr === ymd);

    const cats = [
      { key: 'event',  label: 'Events / Reservations', accent: COLORS.event  },
      { key: 'band',   label: 'Live Music',             accent: COLORS.band   },
      { key: 'food',   label: 'Food Specials',          accent: COLORS.food   },
      { key: 'firkin', label: 'Firkins',                accent: COLORS.firkin },
    ];

    const el = document.getElementById('dayContent');
    if (allData.length === 0) {
      el.innerHTML = `<div class="empty-state">Connect a Google Sheet to view the schedule</div>`;
      return;
    }

    let html = '';
    for (const cat of cats) {
      const items = dayData.filter(r => r.type === cat.key);
      html += `<div class="category-section">
        <div class="cat-header">
          <div class="cat-label">${cat.label}</div>
          <div class="cat-line"></div>
          <div class="cat-count">${items.length}</div>
        </div>`;
      if (items.length === 0) {
        html += `<div class="empty-state">None scheduled</div>`;
      } else {
        for (const item of items) {
          html += `<div class="card">
            <div class="card-accent" style="background:${cat.accent}"></div>
            <div class="card-title">${item.title || '—'}</div>
            <div class="card-meta">`;
          if (item.time)   html += `<div class="card-tag highlight">⏱ ${item.time}</div>`;
          if (item.detail) html += `<div class="card-tag note">ℹ ${item.detail}</div>`;
          html += `</div>`;
          if (item.notes)  html += `<div class="card-note">${item.notes}</div>`;
          html += `</div>`;
        }
      }
      html += `</div>`;
    }
    el.innerHTML = html;
  }

  function changeDay(dir) {
    selectedDate = new Date(selectedDate);
    selectedDate.setDate(selectedDate.getDate() + dir);
    renderDayView();
  }

  function goToday() {
    selectedDate = new Date();
    renderDayView();
  }

  function renderCalendar() {
    const y = calMonth.getFullYear();
    const m = calMonth.getMonth();
    document.getElementById('monthTitle').textContent =
      calMonth.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

    const first = new Date(y, m, 1);
    const last  = new Date(y, m+1, 0);
    const todayYMD = toYMD(new Date());
    const selYMD   = toYMD(selectedDate);

    let html = ['Su','Mo','Tu','We','Th','Fr','Sa'].map(d => `<div class="cal-dow">${d}</div>`).join('');

    for (let i = 0; i < first.getDay(); i++) {
      html += `<div class="cal-day other-month"></div>`;
    }

    for (let d = 1; d <= last.getDate(); d++) {
      const date = new Date(y, m, d);
      const ymd  = toYMD(date);
      const isToday = ymd === todayYMD;
      const isSel   = ymd === selYMD;
      const dayData = allData.filter(r => r.dateStr === ymd);

      const pips = [...new Set(dayData.map(r => r.type))].map(t =>
        `<div class="cal-pip" style="background:${COLORS[t] || '#555'}"></div>`
      ).join('');

      const preview = dayData.length > 0
        ? dayData.slice(0,2).map(r => `<div>${r.title || r.type}</div>`).join('') +
          (dayData.length > 2 ? `<div>+${dayData.length-2} more</div>` : '')
        : '';

      html += `<div class="cal-day ${isToday?'today':''} ${isSel?'selected':''}" onclick="selectDay(${y},${m},${d})">
        <div class="cal-day-num">${d}</div>
        <div class="cal-pip-row">${pips}</div>
        <div class="cal-day-preview">${preview}</div>
      </div>`;
    }

    document.getElementById('calGrid').innerHTML = html;
  }

  function selectDay(y, m, d) {
    selectedDate = new Date(y, m, d);
    setView('day');
    renderDayView();
  }

  function changeMonth(dir) {
    calMonth = new Date(calMonth.getFullYear(), calMonth.getMonth() + dir, 1);
    renderCalendar();
  }
</script>
</body>
</html>
