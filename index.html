<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faircraft Staff Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Germania+One&family=Montserrat:wght@300;400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --obsidian: #0A0A0A;
    --gold: #C5A059;
    --concrete: #2E2E2E;
    --neutral900: #171717;
    --white: #FFFFFF;
    --concrete-light: #8C8C8C;
    --taupe: #564E58;
    --burnt-rose: #904E55;
    --icy-blue: #A5D8FF;
    --kiln-red: #803030;
    --food-green: #5a9e5a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--obsidian);
    color: var(--white);
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── HEADER ── */
  .header {
    background: var(--neutral900);
    border-bottom: 1px solid var(--concrete);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    font-family: 'Germania One', serif;
    font-size: 20px;
    color: var(--gold);
    letter-spacing: 1px;
  }
  .header-logo span {
    color: var(--white);
    font-size: 11px;
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    display: block;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: -2px;
  }
  .header-date {
    font-family: 'Lato', sans-serif;
    font-size: 11px;
    color: var(--concrete-light);
    text-align: right;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .header-date strong {
    display: block;
    color: var(--gold);
    font-size: 13px;
    font-weight: 700;
  }

  /* ── ALERT BANNER ── */
  #alertBanner { display: none; }
  .alert-banner {
    background: #1a0e00;
    border-bottom: 2px solid var(--gold);
    padding: 0 20px;
  }
  .alert-banner-inner {
    padding: 10px 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .alert-header-row {
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: space-between;
  }
  .alert-label {
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .alert-label::before {
    content: '⚑';
    font-size: 12px;
  }
  .alert-dismiss {
    background: transparent;
    border: none;
    color: var(--concrete-light);
    font-size: 16px;
    cursor: pointer;
    line-height: 1;
    padding: 0 4px;
  }
  .alert-dismiss:hover { color: var(--white); }
  .alert-item {
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    color: var(--white);
    font-weight: 400;
    line-height: 1.4;
    padding: 8px 10px;
    background: #221500;
    border-left: 3px solid var(--gold);
  }
  .alert-item + .alert-item { margin-top: 4px; }
  .alert-notes {
    font-size: 12px;
    color: var(--concrete-light);
    margin-top: 4px;
    font-weight: 300;
    line-height: 1.4;
  }
  .alert-posted {
    font-size: 10px;
    color: var(--concrete-light);
    margin-top: 2px;
    font-weight: 300;
  }

  /* ── TABS ── */
  .view-toggle {
    display: flex;
    gap: 0;
    padding: 16px 20px 0;
    border-bottom: 1px solid var(--concrete);
    overflow-x: auto;
  }
  .toggle-btn {
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 18px;
    background: transparent;
    border: 1px solid var(--concrete);
    border-right: none;
    color: var(--concrete-light);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .toggle-btn:last-child { border-right: 1px solid var(--concrete); }
  .toggle-btn.active {
    background: var(--gold);
    color: var(--obsidian);
    border-color: var(--gold);
  }

  /* ── STATUS ── */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 20px;
    font-family: 'Lato', sans-serif;
    font-size: 11px;
    color: var(--concrete-light);
    border-bottom: 1px solid var(--concrete);
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--taupe);
    flex-shrink: 0;
  }
  .status-dot.live { background: #5a9e5a; animation: pulse 2s infinite; }
  .status-dot.loading { background: var(--gold); animation: pulse 0.8s infinite; }
  .status-dot.error { background: var(--kiln-red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
  .refresh-btn {
    background: transparent;
    border: 1px solid var(--concrete);
    color: var(--concrete-light);
    padding: 4px 10px;
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    margin-left: auto;
    transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* ── LEGEND ── */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    padding: 10px 20px;
    border-bottom: 1px solid var(--concrete);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    color: var(--concrete-light);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* ── DAY VIEW ── */
  .day-view { padding: 16px 20px 40px; }
  .date-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .date-nav button {
    background: var(--neutral900);
    border: 1px solid var(--concrete);
    color: var(--white);
    width: 34px; height: 34px;
    font-size: 16px;
    cursor: pointer;
    transition: border-color 0.2s;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .date-nav button:hover { border-color: var(--gold); color: var(--gold); }
  .date-display { font-family: 'Germania One', serif; font-size: 22px; letter-spacing: 1px; }
  .date-display .weekday {
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    display: block;
    margin-bottom: 2px;
  }
  .today-badge {
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: var(--gold);
    color: var(--obsidian);
    padding: 4px 10px;
    margin-left: auto;
    cursor: pointer;
  }

  /* ── CATEGORY SECTION ── */
  .category-section { margin-bottom: 18px; }
  .cat-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .cat-label {
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    white-space: nowrap;
  }
  .cat-line { flex: 1; height: 1px; background: var(--concrete); }
  .cat-count { font-family: 'Lato', sans-serif; font-size: 10px; color: var(--concrete-light); }
  .cat-note {
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    color: var(--taupe);
    font-style: italic;
    letter-spacing: 1px;
  }

  /* ── CARD ── */
  .card {
    background: var(--neutral900);
    border: 1px solid var(--concrete);
    padding: 12px 14px;
    margin-bottom: 8px;
    transition: border-color 0.2s;
    position: relative;
  }
  .card:hover { border-color: var(--gold); }
  .card-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .card-title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--white);
    margin-bottom: 4px;
    padding-left: 10px;
  }
  .card-meta { display: flex; flex-wrap: wrap; gap: 10px; padding-left: 10px; }
  .card-tag {
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--concrete-light);
    display: flex; align-items: center; gap: 4px;
  }
  .card-tag.highlight { color: var(--gold); }
  .card-tag.blue { color: var(--icy-blue); }
  .card-note {
    padding: 6px 10px 0;
    margin-top: 6px;
    font-family: 'Lato', sans-serif;
    font-size: 12px;
    color: var(--concrete-light);
    font-weight: 300;
    line-height: 1.5;
    border-top: 1px solid var(--concrete);
  }

  /* Special card (wider description focus) */
  .card-desc {
    padding: 6px 10px 0;
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    color: var(--white);
    font-weight: 300;
    line-height: 1.5;
  }

  .empty-state {
    font-family: 'Lato', sans-serif;
    font-size: 12px;
    color: var(--taupe);
    font-style: italic;
    padding: 12px 14px;
    border: 1px dashed var(--concrete);
    text-align: center;
  }

  /* Muted section (firkins on non-Fri/Sat) */
  .section-muted .cat-label { color: var(--taupe); }
  .section-muted .cat-note { color: var(--concrete); }

  /* ── MONTH VIEW ── */
  .month-view { padding: 16px 20px 40px; }
  .month-nav {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  }
  .month-title { font-family: 'Germania One', serif; font-size: 20px; letter-spacing: 1px; flex: 1; }
  .month-nav button {
    background: var(--neutral900);
    border: 1px solid var(--concrete);
    color: var(--white);
    width: 32px; height: 32px;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .month-nav button:hover { border-color: var(--gold); color: var(--gold); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-dow {
    font-family: 'Lato', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--concrete-light);
    text-align: center;
    padding: 6px 0;
  }
  .cal-day {
    background: var(--neutral900);
    border: 1px solid var(--concrete);
    min-height: 72px;
    padding: 6px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .cal-day:hover { border-color: var(--taupe); }
  .cal-day.today { border-color: var(--gold); }
  .cal-day.selected { border-color: var(--gold); background: #1a1508; }
  .cal-day.other-month { opacity: 0.25; pointer-events: none; }
  .cal-day-num { font-family: 'Germania One', serif; font-size: 15px; line-height: 1; margin-bottom: 4px; }
  .cal-day.today .cal-day-num { color: var(--gold); }
  .cal-pip-row { display: flex; flex-wrap: wrap; gap: 2px; }
  .cal-pip { width: 6px; height: 6px; border-radius: 50%; }
  .cal-day-preview {
    font-family: 'Lato', sans-serif;
    font-size: 9px;
    color: var(--concrete-light);
    line-height: 1.3;
    margin-top: 3px;
  }

  /* ── BACK BUTTON ── */
  .back-btn {
    display: none;
    align-items: center;
    gap: 8px;
    font-family: 'Lato', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 14px 20px 0;
    width: 100%;
    text-align: left;
  }
  .back-btn:hover { color: var(--white); }
  .back-btn::before { content: '←'; font-size: 16px; }
  .back-btn.visible { display: flex; }

  /* ── ASSIGNEES ── */
  .assignee-row {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    padding-left: 10px;
    margin-top: 7px;
  }
  .assignee-pill {
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--concrete);
    color: var(--concrete-light);
    border: 1px solid var(--taupe);
    padding: 2px 8px;
    border-radius: 2px;
  }

  /* ── MOBILE ── */
  @media (max-width: 480px) {
    .cal-day { min-height: 52px; padding: 4px; }
    .cal-day-num { font-size: 12px; }
    .cal-day-preview { display: none; }
    .header-logo { font-size: 17px; }
    .date-display { font-size: 18px; }
    .config-banner input { min-width: 120px; }
    .toggle-btn { padding: 10px 12px; font-size: 10px; letter-spacing: 1px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">
    Faircraft
    <span>Staff Portal</span>
  </div>
  <div class="header-date" id="headerDate"></div>
</div>

<!-- ALERT BANNER -->
<div id="alertBanner" class="alert-banner">
  <div class="alert-banner-inner">
    <div class="alert-header-row">
      <div class="alert-label">Staff Alerts</div>
      <button class="alert-dismiss" onclick="dismissAlerts()" title="Dismiss">✕</button>
    </div>
    <div id="alertList"></div>
  </div>
</div>

<!-- VIEW TABS -->
<div class="view-toggle">
  <button class="toggle-btn active" id="dayBtn"   onclick="setView('day')">Day View</button>
  <button class="toggle-btn"        id="monthBtn" onclick="setView('month')">Month View</button>
</div>

<!-- STATUS -->
<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">Loading...</span>
  <button class="refresh-btn" onclick="loadAllData()" id="refreshBtn">↺ Refresh</button>
</div>

<!-- LEGEND -->
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--gold)"></div> Events</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--burnt-rose)"></div> Bands</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--food-green)"></div> Specials</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--icy-blue)"></div> Firkins</div>
</div>

<!-- DAY VIEW -->
<div class="day-view" id="dayView">
  <button class="back-btn" id="backBtn" onclick="goBackToMonth()">Month View</button>
  <div class="date-nav">
    <button onclick="changeDay(-1)">&#8249;</button>
    <div>
      <div class="date-display">
        <span class="weekday" id="dayWeekday">—</span>
        <span id="dayDateLabel">—</span>
      </div>
    </div>
    <button onclick="changeDay(1)">&#8250;</button>
    <div class="today-badge" onclick="goToday()">Today</div>
  </div>
  <div id="dayContent"></div>
</div>

<!-- MONTH VIEW -->
<div class="month-view" id="monthView" style="display:none">
  <div class="month-nav">
    <button onclick="changeMonth(-1)">&#8249;</button>
    <div class="month-title" id="monthTitle"></div>
    <button onclick="changeMonth(1)">&#8250;</button>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const SHEET_ID = '1Hr0lgStBGYwNMSajP2DYt_5X8KLuhjqDJsOJhpEvcY4';

const COLORS = {
  event:  '#C5A059',
  band:   '#904E55',
  food:   '#5a9e5a',
  firkin: '#A5D8FF',
};

// Firkins only show on Friday (5) and Saturday (6)
const FIRKIN_DAYS = new Set([5, 6]);

// ─── STATE ───────────────────────────────────────────────────────────────────
let selectedDate = new Date();
let calMonth     = new Date();
let scheduleData = [];   // from Sheet1: events & bands
let specialsData = [];   // from Specials tab
let alertsData   = [];   // from Alerts tab
let alertsDismissed = false;
let cameFromMonth = false;

// ─── BOOT ─────────────────────────────────────────────────────────────────────
window.onload = () => {
  updateHeaderDate();
  setInterval(updateHeaderDate, 60000);
  loadAllData();
  renderDayView();
  renderCalendar();
};

function updateHeaderDate() {
  const now = new Date();
  document.getElementById('headerDate').innerHTML =
    `<strong>${now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</strong>`+
    `${now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`;
}

// ─── VIEW ─────────────────────────────────────────────────────────────────────
function setView(v) {
  document.getElementById('dayView').style.display   = v==='day'   ? '' : 'none';
  document.getElementById('monthView').style.display = v==='month' ? '' : 'none';
  document.getElementById('dayBtn').classList.toggle('active',   v==='day');
  document.getElementById('monthBtn').classList.toggle('active', v==='month');
  if (v==='month') renderCalendar();
}

// ─── LOAD ─────────────────────────────────────────────────────────────────────
async function loadAllData() {
  setStatus('loading', 'Fetching schedule...');
  try {
    const [sheet1, specials, alerts] = await Promise.all([
      fetchSheet('Events'),
      fetchSheet('Specials'),
      fetchSheet('Alerts'),
    ]);
    scheduleData = parseSchedule(sheet1);
    specialsData = parseSpecials(specials);
    alertsData   = parseAlerts(alerts);

    const total = scheduleData.length + specialsData.length;
    const t = new Date();
    setStatus('live', `Live · ${total} entries · ${t.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`);

    renderAlerts();
    renderDayView();
    renderCalendar();
  } catch(e) {
    setStatus('error', 'Could not load — make sure sheet is shared: Anyone with link → Viewer');
  }
}

async function fetchSheet(tabName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tabName)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Sheet tab "${tabName}" not found`);
  return res.text();
}

// ─── PARSERS ──────────────────────────────────────────────────────────────────

// Sheet1: Date | Type | Title | Time | Notes | Detail | Assigned To
function parseSchedule(csv) {
  const rows = [];
  const lines = csv.trim().split('\n');
  for (let i = 1; i < lines.length; i++) {
    const c = splitCSV(lines[i]);
    const d = parseDate(c[0]);
    if (!d) continue;
    const type = (c[1]||'').replace(/"/g,'').trim().toLowerCase();
    if (!['event','band','firkin'].includes(type)) continue;
    // Column G (index 6): comma-separated names, read as-is from sheet
    const assignedRaw = clean(c[6]);
    const assigned = assignedRaw
      ? assignedRaw.split(',').map(n => n.trim()).filter(Boolean)
      : [];
    rows.push({
      dateStr: toYMD(d),
      type,
      title:    clean(c[2]),
      time:     clean(c[3]),
      notes:    clean(c[4]),
      detail:   clean(c[5]),
      assigned,
    });
  }
  return rows;
}

// Specials: Item | Start Date | Description
// Active window: Start Date (Wed) through following Mon
function parseSpecials(csv) {
  const rows = [];
  const lines = csv.trim().split('\n');
  for (let i = 1; i < lines.length; i++) {
    const c = splitCSV(lines[i]);
    const start = parseDate(c[1]);
    if (!start) continue;
    // End = following Monday (start + days until next Mon)
    const end = new Date(start);
    const daysToMon = (8 - start.getDay()) % 7 || 7; // days until next Monday
    end.setDate(start.getDate() + daysToMon);
    rows.push({
      title:     clean(c[0]),
      startDate: start,
      endDate:   end,
      desc:      clean(c[2]),
    });
  }
  return rows;
}

// Alerts: Message | Active (boolean checkbox) | Posted (date) | Notes
function parseAlerts(csv) {
  const rows = [];
  const lines = csv.trim().split('\n');
  console.log('[Faircraft] Alerts raw CSV:', lines);
  for (let i = 1; i < lines.length; i++) {
    const c = splitCSV(lines[i]);
    const msg = clean(c[0]);
    if (!msg) continue;

    // Google Sheets checkbox exports as TRUE/FALSE unquoted
    const activeRaw = clean(c[1]).toUpperCase();
    const active = activeRaw === 'TRUE';
    console.log(`[Faircraft] Alert "${msg}" activeRaw="${activeRaw}" active=${active}`);
    if (!active) continue;

    // Google Sheets date columns export as Date(yyyy,m,d) — convert to readable
    const postedRaw = clean(c[2]);
    const posted = parseGSheetsDate(postedRaw) || postedRaw;

    rows.push({ msg, posted, notes: clean(c[3]) });
  }
  return rows;
}

// Handles Google Sheets gviz date format: Date(2025,5,28) — months are 0-indexed
function parseGSheetsDate(s) {
  if (!s) return '';
  const m = s.match(/Date\((\d+),(\d+),(\d+)\)/);
  if (!m) return s; // not a gviz date, return as-is
  const d = new Date(parseInt(m[1]), parseInt(m[2]), parseInt(m[3]));
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// ─── ALERTS BANNER ────────────────────────────────────────────────────────────
function renderAlerts() {
  const banner = document.getElementById('alertBanner');
  if (!alertsData.length || alertsDismissed) { banner.style.display = 'none'; return; }
  banner.style.display = '';
  document.getElementById('alertList').innerHTML = alertsData.map(a =>
    `<div class="alert-item">
      ${a.msg}
      ${a.notes ? `<div class="alert-notes">${a.notes}</div>` : ''}
      ${a.posted ? `<div class="alert-posted">Posted ${a.posted}</div>` : ''}
    </div>`
  ).join('');
}

function dismissAlerts() {
  alertsDismissed = true;
  document.getElementById('alertBanner').style.display = 'none';
}

// ─── DAY VIEW ─────────────────────────────────────────────────────────────────
function renderDayView() {
  const dows = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('dayWeekday').textContent  = dows[selectedDate.getDay()];
  document.getElementById('dayDateLabel').textContent = selectedDate.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});

  document.getElementById('backBtn').classList.toggle('visible', cameFromMonth);
  const ymd    = toYMD(selectedDate);
  const dow    = selectedDate.getDay(); // 0=Sun … 6=Sat
  const isFriSat = FIRKIN_DAYS.has(dow);

  // Filter schedule rows for this day
  const daySchedule = scheduleData.filter(r => r.dateStr === ymd);

  // Filter specials active on this date
  const daySpecials = specialsData.filter(s => {
    const d = new Date(selectedDate); d.setHours(12);
    return d >= s.startDate && d <= s.endDate;
  });

  // Firkins for this day (from Sheet1 type=firkin)
  const dayFirkins = daySchedule.filter(r => r.type === 'firkin');

  const el = document.getElementById('dayContent');

  if (scheduleData.length + specialsData.length === 0) {
    el.innerHTML = `<div class="empty-state">Connect a Google Sheet to view the schedule</div>`;
    return;
  }

  let html = '';

  // ── Events
  const events = daySchedule.filter(r => r.type === 'event');
  html += buildSection('Events / Reservations', COLORS.event, events);

  // ── Bands
  const bands = daySchedule.filter(r => r.type === 'band');
  html += buildSection('Live Music', COLORS.band, bands);

  // ── Food Specials (date-range, always visible)
  html += `<div class="category-section">
    <div class="cat-header">
      <div class="cat-label">Food Specials</div>
      <div class="cat-line"></div>
      <div class="cat-count">${daySpecials.length}</div>
    </div>`;
  if (!daySpecials.length) {
    html += `<div class="empty-state">No specials this week</div>`;
  } else {
    daySpecials.forEach(s => {
      html += `<div class="card">
        <div class="card-accent" style="background:${COLORS.food}"></div>
        <div class="card-title">${s.title}</div>`;
      if (s.desc) html += `<div class="card-desc">${s.desc}</div>`;
      html += `<div class="card-meta" style="margin-top:6px">
        <div class="card-tag">📅 ${fmtDate(s.startDate)} – ${fmtDate(s.endDate)}</div>
      </div></div>`;
    });
  }
  html += `</div>`;

  // ── Firkins (Fri/Sat only)
  html += `<div class="category-section ${!isFriSat ? 'section-muted' : ''}">
    <div class="cat-header">
      <div class="cat-label">Firkins</div>
      <div class="cat-line"></div>
      ${isFriSat
        ? `<div class="cat-count">${dayFirkins.length}</div>`
        : `<div class="cat-note">Fri &amp; Sat only</div>`}
    </div>`;
  if (!isFriSat) {
    html += `<div class="empty-state">Firkins are tapped Friday &amp; Saturday</div>`;
  } else if (!dayFirkins.length) {
    html += `<div class="empty-state">No firkins scheduled</div>`;
  } else {
    dayFirkins.forEach(f => {
      html += `<div class="card">
        <div class="card-accent" style="background:${COLORS.firkin}"></div>
        <div class="card-title">${f.title}</div>
        <div class="card-meta">`;
      if (f.time)   html += `<div class="card-tag highlight">⏱ ${f.time}</div>`;
      if (f.detail) html += `<div class="card-tag blue">ℹ ${f.detail}</div>`;
      html += `</div>`;
      if (f.assigned && f.assigned.length) {
        html += `<div class="assignee-row">${f.assigned.map(n=>`<div class="assignee-pill">${n}</div>`).join('')}</div>`;
      }
      if (f.notes)  html += `<div class="card-note">${f.notes}</div>`;
      html += `</div>`;
    });
  }
  html += `</div>`;

  el.innerHTML = html;
}

function buildSection(label, color, items) {
  let html = `<div class="category-section">
    <div class="cat-header">
      <div class="cat-label">${label}</div>
      <div class="cat-line"></div>
      <div class="cat-count">${items.length}</div>
    </div>`;
  if (!items.length) {
    html += `<div class="empty-state">None scheduled</div>`;
  } else {
    items.forEach(item => {
      html += `<div class="card">
        <div class="card-accent" style="background:${color}"></div>
        <div class="card-title">${item.title || '—'}</div>
        <div class="card-meta">`;
      if (item.time)   html += `<div class="card-tag highlight">⏱ ${item.time}</div>`;
      if (item.detail) html += `<div class="card-tag blue">ℹ ${item.detail}</div>`;
      html += `</div>`;
      if (item.assigned && item.assigned.length) {
        html += `<div class="assignee-row">${item.assigned.map(n=>`<div class="assignee-pill">${n}</div>`).join('')}</div>`;
      }
      if (item.notes)  html += `<div class="card-note">${item.notes}</div>`;
      html += `</div>`;
    });
  }
  return html + `</div>`;
}

function changeDay(dir) {
  cameFromMonth = false;
  selectedDate = new Date(selectedDate);
  selectedDate.setDate(selectedDate.getDate() + dir);
  renderDayView();
}

function goToday() {
  cameFromMonth = false;
  selectedDate = new Date();
  renderDayView();
}

// ─── MONTH VIEW ───────────────────────────────────────────────────────────────
function renderCalendar() {
  const y = calMonth.getFullYear();
  const m = calMonth.getMonth();
  document.getElementById('monthTitle').textContent =
    calMonth.toLocaleDateString('en-US',{month:'long',year:'numeric'});

  const first    = new Date(y, m, 1);
  const last     = new Date(y, m+1, 0);
  const todayYMD = toYMD(new Date());
  const selYMD   = toYMD(selectedDate);

  let html = ['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="cal-dow">${d}</div>`).join('');

  for (let i = 0; i < first.getDay(); i++) html += `<div class="cal-day other-month"></div>`;

  for (let d = 1; d <= last.getDate(); d++) {
    const date = new Date(y, m, d);
    const ymd  = toYMD(date);
    const dow  = date.getDay();
    const isToday = ymd === todayYMD;
    const isSel   = ymd === selYMD;

    // Collect what's on this day
    const daySchedule = scheduleData.filter(r => r.dateStr === ymd);
    const hasSpecial  = specialsData.some(s => { const dt = new Date(date); dt.setHours(12); return dt >= s.startDate && dt <= s.endDate; });
    const hasFirkin   = FIRKIN_DAYS.has(dow) && daySchedule.some(r => r.type==='firkin');
    const hasEvent    = daySchedule.some(r => r.type==='event');
    const hasBand     = daySchedule.some(r => r.type==='band');

    const pips = [
      hasEvent   ? COLORS.event  : null,
      hasBand    ? COLORS.band   : null,
      hasSpecial ? COLORS.food   : null,
      hasFirkin  ? COLORS.firkin : null,
    ].filter(Boolean).map(c => `<div class="cal-pip" style="background:${c}"></div>`).join('');

    const previewItems = daySchedule.filter(r=>r.type!=='firkin'||FIRKIN_DAYS.has(dow));
    const preview = previewItems.slice(0,2).map(r=>`<div>${r.title}</div>`).join('') +
      (previewItems.length > 2 ? `<div>+${previewItems.length-2} more</div>` : '') +
      (hasSpecial ? `<div>Specials</div>` : '');

    html += `<div class="cal-day ${isToday?'today':''} ${isSel?'selected':''}" onclick="selectDay(${y},${m},${d})">
      <div class="cal-day-num">${d}</div>
      <div class="cal-pip-row">${pips}</div>
      <div class="cal-day-preview">${preview}</div>
    </div>`;
  }

  document.getElementById('calGrid').innerHTML = html;
}

function selectDay(y, m, d) {
  selectedDate = new Date(y, m, d);
  cameFromMonth = true;
  setView('day');
  renderDayView();
}

function goBackToMonth() {
  cameFromMonth = false;
  document.getElementById('backBtn').classList.remove('visible');
  setView('month');
}

function changeMonth(dir) {
  calMonth = new Date(calMonth.getFullYear(), calMonth.getMonth()+dir, 1);
  renderCalendar();
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function toYMD(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtDate(d) {
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function parseDate(s) {
  if (!s) return null;
  s = s.replace(/"/g,'').trim();
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) { const d = new Date(s+'T00:00:00'); return isNaN(d)?null:d; }
  const p = s.split('/');
  if (p.length >= 3) {
    let yr = parseInt(p[2]); if (yr<100) yr+=2000;
    const d = new Date(yr, parseInt(p[0])-1, parseInt(p[1]));
    return isNaN(d)?null:d;
  }
  return null;
}

function clean(s) { return (s||'').replace(/"/g,'').trim(); }

function splitCSV(line) {
  const result=[]; let cur='', inQ=false;
  for (let c of line) {
    if (c==='"') { inQ=!inQ; }
    else if (c===','&&!inQ) { result.push(cur); cur=''; }
    else cur+=c;
  }
  result.push(cur);
  return result;
}

function setStatus(state, text) {
  document.getElementById('statusDot').className = 'status-dot' + (state!=='idle'?' '+state:'');
  document.getElementById('statusText').textContent = text;
}
</script>
